name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Test
      run: npm test 2>&1 | tee test-output.txt

    - name: Publish test summary
      if: always() && matrix.node-version == 22
      run: |
        PASS_COUNT=$(grep -oP '\d+(?= passing)' test-output.txt || echo '0')
        FAIL_COUNT=$(grep -oP '\d+(?= failing)' test-output.txt || echo '0')
        PEND_COUNT=$(grep -oP '\d+(?= pending)' test-output.txt || echo '0')
        echo "### Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Passing | $PASS_COUNT |" >> $GITHUB_STEP_SUMMARY
        echo "| Failing | $FAIL_COUNT |" >> $GITHUB_STEP_SUMMARY
        echo "| Pending | $PEND_COUNT |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Node.js ${{ matrix.node-version }} on ubuntu-latest" >> $GITHUB_STEP_SUMMARY

    - name: Run quality gates on self
      if: matrix.node-version == 22
      run: |
        rm -f test-output.txt
        echo "--- npm audit diagnostic ---"
        npm audit --audit-level=moderate --omit=dev || true
        echo "--- running gates ---"
        node dist/src/cli.js gates .

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t swarm-orchestrator:ci .

    - name: Verify container starts
      run: docker run --rm swarm-orchestrator:ci node /app/dist/src/cli.js --help || true
