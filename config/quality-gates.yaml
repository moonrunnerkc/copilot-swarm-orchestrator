# Quality gates for generated projects.
# Keep this deterministic. If you relax a gate, do it intentionally.

enabled: true
failOnIssues: true

# When true, swarm can auto-add follow-up steps to fix gate failures.
# The final gates still run as hard checks.
autoAddRefactorStepOnDuplicateBlocks: true
autoAddReadmeTruthStepOnReadmeClaims: true
autoAddScaffoldFixStepOnScaffoldDefaults: true
autoAddConfigFixStepOnHardcodedConfig: true
autoAddAccessibilityFixStepOnAccessibility: true
autoAddTestCoverageStepOnTestCoverage: true

gates:
  scaffoldDefaults:
    enabled: true

  duplicateBlocks:
    enabled: true
    minLines: 12
    maxOccurrences: 2
    maxFindings: 20

  hardcodedConfig:
    enabled: true

  readmeClaims:
    enabled: true

  testIsolation:
    enabled: true

  # Runtime checks run the project's own tests, linter, and security audit.
  # Each sub-check (test, lint, audit) is skipped gracefully when the target
  # project lacks the relevant script, config, or package.json.
  runtimeChecks:
    enabled: true
    retries: 1
    runTests: true
    runLint: true
    runAudit: true
    timeoutMs: 120000

  accessibility:
    enabled: true
    requireSkipLink: true
    requireHeadingHierarchy: true
    requireAriaLabels: true
    requireFocusStyles: true
    requireReducedMotion: true
    requireNoPhantomAssets: true
    requireMetaTags: true
    requireResponsiveCSS: true
    requireColorScheme: true
    requireSemanticHTML: true
    requireImgAlt: true

  testCoverage:
    enabled: true
    entryPointPatterns:
      - '^src/dashboard\.tsx?$'
    minTestAssertions: 1
    requireComponentTests: true
